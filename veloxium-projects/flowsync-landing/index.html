<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FlowSync - Modern project management tool that boosts team productivity by 40%. Real-time collaboration, Kanban boards, and seamless workflow management.">
    <title>FlowSync - Sync Your Team. Flow Through Projects.</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #4F46E5;
            --secondary: #0EA5E9;
            --accent: #10B981;
            --background: #FAFBFC;
            --surface: #FFFFFF;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 0;
            transition: var(--transition);
        }
        
        .nav.scrolled {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-md);
            padding: 0.75rem 0;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-primary);
            text-decoration: none;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon svg {
            width: 20px;
            height: 20px;
            color: white;
        }
        
        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }
        
        .nav-links a:hover {
            color: var(--primary);
        }
        
        .nav-cta {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            font-family: inherit;
        }
        
        .btn-ghost {
            background: transparent;
            color: var(--text-primary);
        }
        
        .btn-ghost:hover {
            background: var(--background);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.4);
        }
        
        .btn-primary:hover {
            background: #4338CA;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(79, 70, 229, 0.5);
        }
        
        .btn-secondary {
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid #E2E8F0;
        }
        
        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .btn-large {
            padding: 1rem 2rem;
            font-size: 1rem;
        }
        
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 1001;
        }
        
        .hamburger span {
            width: 24px;
            height: 2px;
            background: var(--text-primary);
            transition: var(--transition);
            border-radius: 2px;
        }
        
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }
        
        /* Mobile Menu */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--surface);
            z-index: 999;
            padding: 6rem 2rem 2rem;
            flex-direction: column;
            gap: 1rem;
        }
        
        .mobile-menu.active {
            display: flex;
        }
        
        .mobile-menu a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.25rem;
            font-weight: 500;
            padding: 1rem 0;
            border-bottom: 1px solid #E2E8F0;
        }
        
        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 8rem 1.5rem 4rem;
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(79, 70, 229, 0.15), transparent);
            pointer-events: none;
        }
        
        .hero-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }
        
        .hero-content {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease forwards;
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(14, 165, 233, 0.1));
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }
        
        .hero-badge svg {
            width: 16px;
            height: 16px;
        }
        
        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 3.75rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }
        
        .hero h1 .highlight {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero-description {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.7;
        }
        
        .hero-cta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        
        .hero-stats {
            display: flex;
            gap: 2.5rem;
        }
        
        .stat {
            text-align: left;
        }
        
        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .stat-value span {
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .hero-visual {
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease 0.3s forwards;
        }
        
        .hero-image {
            width: 100%;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .floating-card {
            position: absolute;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: float 6s ease-in-out infinite;
        }
        
        .floating-card-1 {
            top: 10%;
            right: -20px;
            animation-delay: 0s;
        }
        
        .floating-card-2 {
            bottom: 15%;
            left: -20px;
            animation-delay: 2s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .floating-card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .floating-card-icon.green {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
        }
        
        .floating-card-icon.blue {
            background: rgba(14, 165, 233, 0.1);
            color: var(--secondary);
        }
        
        .floating-card-text {
            font-size: 0.875rem;
        }
        
        .floating-card-title {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .floating-card-subtitle {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
        
        /* Sections Common */
        section {
            padding: 6rem 1.5rem;
        }
        
        .section-header {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 4rem;
        }
        
        .section-tag {
            display: inline-block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }
        
        .section-title {
            font-size: clamp(2rem, 4vw, 2.75rem);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        
        .section-description {
            font-size: 1.125rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Features Section */
        .features {
            background: var(--surface);
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }
        
        .feature-card {
            padding: 2rem;
            border-radius: var(--radius-lg);
            background: var(--background);
            border: 1px solid transparent;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
        }
        
        .feature-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .feature-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
            transform: translateY(-5px);
        }
        
        .feature-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            background: var(--gradient);
            color: white;
        }
        
        .feature-icon svg {
            width: 28px;
            height: 28px;
        }
        
        .feature-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }
        
        .feature-description {
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        /* Social Proof Section */
        .social-proof {
            background: var(--background);
        }
        
        .logos-section {
            margin-bottom: 5rem;
        }
        
        .logos-title {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .logos-carousel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4rem;
            flex-wrap: wrap;
            opacity: 0.6;
        }
        
        .logo-item {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        
        .logo-item:hover {
            color: var(--text-primary);
            opacity: 1;
        }
        
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }
        
        .testimonial-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
        }
        
        .testimonial-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .testimonial-card:hover {
            box-shadow: var(--shadow-xl);
            transform: translateY(-5px);
        }
        
        .testimonial-stars {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 1rem;
            color: #FBBF24;
        }
        
        .testimonial-text {
            font-size: 1rem;
            color: var(--text-primary);
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }
        
        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .testimonial-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .testimonial-info h4 {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        
        .testimonial-info p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        /* Pricing Section */
        .pricing {
            background: var(--surface);
        }
        
        .pricing-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }
        
        .pricing-toggle span {
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .pricing-toggle span.active {
            color: var(--text-primary);
        }
        
        .toggle-switch {
            width: 56px;
            height: 30px;
            background: var(--primary);
            border-radius: 50px;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: var(--transition);
        }
        
        .toggle-switch.annual::after {
            left: 29px;
        }
        
        .pricing-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
        }
        
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            align-items: start;
        }
        
        .pricing-card {
            background: var(--background);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            border: 2px solid transparent;
            transition: var(--transition);
            position: relative;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .pricing-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .pricing-card.popular {
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: var(--shadow-xl);
            transform: scale(1.05);
        }
        
        .pricing-card.popular.visible {
            transform: scale(1.05);
        }
        
        .pricing-card:hover {
            box-shadow: var(--shadow-lg);
        }
        
        .popular-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gradient);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.375rem 1rem;
            border-radius: 50px;
        }
        
        .pricing-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #E2E8F0;
        }
        
        .pricing-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .pricing-tagline {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }
        
        .pricing-price {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.25rem;
        }
        
        .pricing-currency {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .pricing-amount {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }
        
        .pricing-period {
            font-size: 1rem;
            color: var(--text-secondary);
        }
        
        .pricing-features {
            list-style: none;
            margin-bottom: 2rem;
        }
        
        .pricing-features li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        
        .pricing-features li svg {
            width: 20px;
            height: 20px;
            color: var(--accent);
            flex-shrink: 0;
        }
        
        .pricing-cta {
            width: 100%;
        }
        
        /* FAQ Section */
        .faq {
            background: var(--background);
        }
        
        .faq-grid {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .faq-item {
            background: var(--surface);
            border-radius: var(--radius);
            margin-bottom: 1rem;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            opacity: 0;
            transform: translateY(20px);
        }
        
        .faq-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .faq-question {
            width: 100%;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            border: none;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            transition: var(--transition);
        }
        
        .faq-question:hover {
            color: var(--primary);
        }
        
        .faq-icon {
            width: 24px;
            height: 24px;
            transition: var(--transition);
            flex-shrink: 0;
        }
        
        .faq-item.active .faq-icon {
            transform: rotate(180deg);
        }
        
        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .faq-item.active .faq-answer {
            max-height: 300px;
        }
        
        .faq-answer-content {
            padding: 0 1.5rem 1.5rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        /* Final CTA Section */
        .final-cta {
            background: var(--gradient);
            color: white;
            text-align: center;
        }
        
        .cta-content {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .cta-content h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        
        .cta-content p {
            font-size: 1.25rem;
            opacity: 0.9;
            margin-bottom: 2.5rem;
        }
        
        .cta-form {
            display: flex;
            gap: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .cta-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
        }
        
        .cta-input::placeholder {
            color: var(--text-secondary);
        }
        
        .cta-button {
            background: var(--text-primary);
            color: white;
            white-space: nowrap;
        }
        
        .cta-button:hover {
            background: #0F172A;
        }
        
        .cta-note {
            font-size: 0.875rem;
            opacity: 0.8;
            margin-top: 1rem;
        }
        
        /* Footer */
        .footer {
            background: var(--text-primary);
            color: white;
            padding: 4rem 1.5rem 2rem;
        }
        
        .footer-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr repeat(3, 1fr);
            gap: 3rem;
            padding-bottom: 3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .footer-brand .logo {
            color: white;
            margin-bottom: 1rem;
        }
        
        .footer-brand p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }
        
        .social-links {
            display: flex;
            gap: 1rem;
        }
        
        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: var(--transition);
        }
        
        .social-link:hover {
            background: var(--primary);
        }
